name: blog-validate

on:
  push:
    branches:
      - main
    paths:
      - "src/content/blog/**"
      - "scripts/blog_pipeline.py"
      - ".github/workflows/blog-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Astro blog content
        run: python scripts/blog_pipeline.py
