name: content-guard

on:
  push:
    branches:
      - main
    paths:
      - "src/content/**"
      - "public/assets/posts/**"
      - "scripts/checks/content_guard.py"
      - ".github/workflows/blog-publish.yml"
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate content integrity
        run: python scripts/checks/content_guard.py
